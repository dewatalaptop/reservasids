  <style>

      --primary: #2a9d8f;
      --primary-dark: #264653;

      --accent: #f4a261;

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    #clock { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 500; letter-spacing: 0.5px; }

    .date-nav-wrapper {

      display: flex; gap: 10px; align-items: center;

    .calendar-btn-group {

    .calendar-btn-group input[type="date"] {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;

    .date-scroller {
      flex-grow: 1; display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 4px; scrollbar-width: none;
    }
    .date-scroller::-webkit-scrollbar { display: none; }

    .date-pill {
      min-width: 50px; height: 50px; border-radius: 10px; background: #f8f9fa; border: 1px solid #e0e0e0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    }
    .date-pill.active {
      background: var(--primary); color: white; border-color: var(--primary-dark);

    }
    .date-pill .day { font-size: 0.65rem; text-transform: uppercase; font-weight: 600; }
    .date-pill .num { font-size: 1.2rem; font-weight: 700; line-height: 1; }

    .nav-tabs {
      background: white; padding: 10px 15px; display: flex; align-items: center; gap: 8px;
      overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid #eee; background: white;
      color: #666; font-weight: 500; font-size: 0.85rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;

    .nav-btn.active { background: var(--primary-dark); color: white; border-color: var(--primary-dark); box-shadow: 0 2px 6px rgba(38, 70, 83, 0.2); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_c1tU70FM84Qi_f_aSaQ-YVLo_18lCkI",
      authDomain: "reservasi-dolan-sawah.firebaseapp.com",
      projectId: "reservasi-dolan-sawah",
      storageBucket: "reservasi-dolan-sawah.appspot.com",
      messagingSenderId: "213151400721",
      appId: "1:213151400721:web:e51b0d8cdd24206cf682b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allReservations = [];
    let menuDetailsCache = {};
    let selectedDate = new Date();
    let currentFilter = 'all';
    let unsubscribe = null;
    let globalCompDetails = {};

    document.addEventListener('DOMContentLoaded', async () => {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        setInterval(updateAllTimers, 60000);

        await loadMenuDetails();
        renderDateScroller();
        loadData(selectedDate);
    });

    async function loadMenuDetails() {
        try {
            const snap = await db.collection('menus').get();
            snap.forEach(doc => { menuDetailsCache[doc.id] = doc.data().details || []; });
            console.log("Menu Cache Loaded:", Object.keys(menuDetailsCache).length);
        } catch(e) {
            console.error("Error loading menus", e);
        }
    }

    function loadData(dateObj) {
        document.getElementById('loader').style.display = 'flex';
        if (unsubscribe) unsubscribe();

        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth()+1).padStart(2,'0');
        const d = String(dateObj.getDate()).padStart(2,'0');
        const dateStr = `${y}-${m}-${d}`;

        unsubscribe = db.collection('reservations')
            .where('date', '==', dateStr)
            .onSnapshot(snap => {
                let temp = [];
                snap.forEach(doc => temp.push({id: doc.id, ...doc.data()}));
                allReservations = temp.sort((a,b) => a.jam.localeCompare(b.jam));
                renderUI();
                document.getElementById('loader').style.display = 'none';
            });
    }

    function renderUI() {
        let filtered = allReservations;
        if (currentFilter === 'pagi') filtered = allReservations.filter(r => parseInt(r.jam) < 15);
        if (currentFilter === 'siang') filtered = allReservations.filter(r => parseInt(r.jam) >= 15);

        document.getElementById('totalRes').innerText = filtered.length;
        document.getElementById('totalPax').innerText = filtered.reduce((a,b) => a + parseInt(b.jumlah||0), 0);

        renderFloor(filtered);
        renderKitchen(filtered);
    }

    function parseExtraOrdersFromNotes(noteText) {
        if (!noteText) return [];
        const detectedItems = [];
        const lowerNote = noteText.toLowerCase();
        const menuNames = Object.keys(menuDetailsCache);

        menuNames.forEach(menuName => {
            const lowerMenu = menuName.toLowerCase();
            if (lowerNote.includes(lowerMenu)) {
                let quantity = 1;
                const patternBefore = new RegExp(`(\\d+)\\s+(?:porsi|buah|pcs)?\\s*${lowerMenu}`, 'i');
                const patternAfter = new RegExp(`${lowerMenu}\\s+(?:sebagai|jadi)?\\s*(\\d+)`, 'i');
                const matchBefore = lowerNote.match(patternBefore);
                const matchAfter = lowerNote.match(patternAfter);
                if (matchBefore) quantity = parseInt(matchBefore[1]);
                else if (matchAfter) quantity = parseInt(matchAfter[1]);

                const negativeCheck = new RegExp(`(?:tanpa|no|jangan)\\s+${lowerMenu}`, 'i');
                if (!negativeCheck.test(lowerNote)) {
                    detectedItems.push({ name: menuName, quantity: quantity, isExtra: true });
                }
            }
        });
        return detectedItems;
    }

    // ============================================
    // HIGHLIGHT KEYWORDS (NEW)
    // ============================================
    function highlightKeywords(text) {
        // PRIORITAS: kata panjang dulu → cegah double-highlight
        // Misal "tidak pedas" harus match sebelum "pedas" dan "tidak" diproses sendiri
        const dangerWords = [
            'tidak pedas', 'no pedas', 'tidak pakai',
            'alergi', 'allergi',
            'tanpa', 'jangan', 'buta',
            'pedas'
        ];
        const actionWords = [
            'extra tambah', 'tambah extra',
            'tambah', 'extra', 'ekstra', 'request', 'minta'
        ];

        let result = escapeHtml(text);

        // Placeholder trick: ganti match dengan token unik dulu, baru wrap span
        // Ini mencegah regex berikutnya menghit inside span yang sudah ditulis
        const replacements = [];

        const collectMatches = (words, cls) => {
            words.forEach(word => {
                const regex = new RegExp(`(${escapeRegex(word)})`, 'gi');
                result = result.replace(regex, (match) => {
                    const token = `%%KWTOKEN${replacements.length}%%`;
                    replacements.push(`<span class="kw-${cls}">${match}</span>`);
                    return token;
                });
            });
        };

        collectMatches(dangerWords, 'danger');
        collectMatches(actionWords, 'action');

        // Restore semua token
        replacements.forEach((span, i) => {
            result = result.replace(`%%KWTOKEN${i}%%`, span);
        });

        return result;
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ============================================

    function getTimerData(jamReservasi) {
        const now = new Date();
        const isToday = selectedDate.toDateString() === now.toDateString();
        if (!isToday) return { text: "Reservasi", class: "timer-safe" };

        const [h, m] = jamReservasi.split(':').map(Number);
        const resTime = new Date();
        resTime.setHours(h, m, 0);
        const diffMs = resTime - now;
        const diffMins = Math.floor(diffMs / 60000);

        if (diffMins < 0) return { text: `Lewat ${Math.abs(diffMins)} mnt`, class: "timer-late" };
        else if (diffMins <= 30) return { text: `Segera! ${diffMins} mnt`, class: "timer-late" };
        else if (diffMins <= 60) return { text: `Siap ${diffMins} mnt`, class: "timer-warn" };
        else {
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            return { text: `${hours}j ${mins}m lagi`, class: "timer-safe" };
        }
    }

    function updateAllTimers() {
        const now = new Date();
        if (selectedDate.toDateString() !== now.toDateString()) return;
        const timerBadges = document.querySelectorAll('.countdown-badge');
        timerBadges.forEach(badge => {
            const jam = badge.getAttribute('data-jam');
            if (jam) {
                const data = getTimerData(jam);
                badge.className = `countdown-badge ${data.class}`;
                badge.innerHTML = `<i class="fas fa-stopwatch"></i> ${data.text}`;
            }
        });
    }

    function renderFloor(data) {
        const container = document.getElementById('floorContainer');
        container.innerHTML = '';
        let totalItems = 0;

        if (data.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:40px; color:#999; grid-column: 1/-1;">Tidak ada reservasi untuk filter ini.</div>`;
            document.getElementById('totalItems').innerText = 0;
            return;
        }

        data.forEach(r => {
            const hour = parseInt(r.jam);
            const borderColor = hour >= 15 ? 'var(--accent)' : 'var(--secondary)';
            const timer = getTimerData(r.jam);

            let combinedMenus = [];
            if (r.menus && r.menus.length) {
                combinedMenus = r.menus.map(m => ({...m, isExtra:false}));
            } else if (r.menu) {
                combinedMenus.push({ name: r.menu, quantity: 1, isExtra:false });
            }
            if (r.tambahan) {
                const detectedExtras = parseExtraOrdersFromNotes(r.tambahan);
                if (detectedExtras.length > 0) combinedMenus = [...combinedMenus, ...detectedExtras];
            }

            let menuHtml = combinedMenus.map(item => {
                totalItems += parseInt(item.quantity);
                const details = menuDetailsCache[item.name] || [];
                const detailString = details.length > 0 ? `<span class="menu-detail-text">• ${details.join(', ')}</span>` : '';
                const extraBadge = item.isExtra ? '<span class="extra-detected">Extra (Catatan)</span>' : '';
                return `
                <div class="menu-row">
                    <span class="menu-qty">${item.quantity}</span>
                    <div class="menu-name">
                        ${item.name} ${extraBadge}
                        ${detailString}
                    </div>
                </div>`;
            }).join('');

            container.innerHTML += `
                <div class="res-card" style="border-left-color: ${borderColor}">
                    <div class="card-top-row">
                        <div class="time-group">
                            <div class="res-time">${r.jam}</div>
                            <div class="countdown-badge ${timer.class}" data-jam="${r.jam}">
                                <i class="fas fa-stopwatch"></i> ${timer.text}
                            </div>
                        </div>
                    </div>
                    <div class="res-details">
                        <span class="res-name">${r.nama}</span>
                        <div class="res-meta">
                            <span><i class="fas fa-users"></i> ${r.jumlah} Org</span> • <span>${r.tempat || '?'}</span>
                        </div>
                    </div>
                    <div class="menu-box">${menuHtml || '<small>Belum ada menu</small>'}</div>
                    ${r.tambahan ? `<div style="margin-top:10px;font-size:0.8rem;background:#fff5f5;padding:10px;border-radius:6px;color:var(--danger); border:1px dashed #feb2b2; line-height:1.4;"><i class="fas fa-comment-dots"></i> <b>Catatan:</b> ${escapeHtml(String(r.tambahan))}</div>` : ''}
                </div>`;
        });
        document.getElementById('totalItems').innerText = totalItems;
    }

    // ============================================
    // NOTE CATEGORY CLASSIFIER
    // ============================================
    function getNoteClass(text) {
        const t = String(text).toLowerCase();
        if (t.includes('alergi') || t.includes('allergi') || t.includes('tanpa') ||
            t.includes('jangan') || t.includes('tidak') || t.includes('buta')) {
            return 'danger';
        }
        if (t.includes('tambah') || t.includes('extra') || t.includes('ekstra') ||
            t.includes('request') || t.includes('minta')) {
            return 'action';
        }
        return 'normal';
    }
    // ============================================

    function renderKitchen(data) {
        // ============================================
        // ✅ RENDER CATATAN TAMBAHAN (NEW - PALING ATAS)
        // ============================================
        const notesCont = document.getElementById('kitchenNotesContainer');
        notesCont.innerHTML = '';

        const notesList = data
            .filter(r => r.tambahan && String(r.tambahan).trim() !== '')
            .sort((a, b) => a.jam.localeCompare(b.jam));

        // Update badge count
        const notesCountEl = document.getElementById('notesCount');
        if (notesList.length > 0) {
            notesCountEl.textContent = `${notesList.length} catatan`;
            notesCountEl.style.display = 'inline-block';
        } else {
            notesCountEl.style.display = 'none';
        }

        notesList.forEach(r => {
            const noteClass = getNoteClass(r.tambahan);
            notesCont.innerHTML += `
            <div class="note-item note-${noteClass}">
                <div class="note-time-badge">${r.jam}</div>
                <div class="note-body">
                    <span class="note-guest-name">
                        <i class="fas fa-user" style="font-size:0.7rem; opacity:0.6;"></i>
                        ${escapeHtml(r.nama)} &nbsp;·&nbsp; ${r.jumlah} org
                    </span>
                    <div class="note-text">${highlightKeywords(String(r.tambahan))}</div>
                </div>
            </div>`;
        });

        if (!notesCont.innerHTML) {
            notesCont.innerHTML = `
            <div class="note-empty">
                <i class="fas fa-check-circle" style="color:#a7f3d0; font-size:1.5rem; display:block; margin-bottom:6px;"></i>
                Tidak ada catatan tambahan.
            </div>`;
        }
        // ============================================

        const menuAgg = {};
        globalCompDetails = {};

        data.forEach(r => {
            const processItem = (name, qty, sourceLabel) => {
                menuAgg[name] = (menuAgg[name] || 0) + qty;
                const details = menuDetailsCache[name];
                if (details && details.length > 0) {
                    details.forEach(comp => {
                        const clean = comp.trim();
                        if (!globalCompDetails[clean]) {
                            globalCompDetails[clean] = { total: 0, items: [], sources: new Set() };
                        }
                        globalCompDetails[clean].total += qty;
                        globalCompDetails[clean].sources.add(name);
                        globalCompDetails[clean].items.push({ nama: r.nama, jam: r.jam, qty: qty, sourceMenu: name });
                    });
                }
            };

            if (r.menus && r.menus.length) {
                r.menus.forEach(item => processItem(item.name, parseInt(item.quantity), "Menu Utama"));
            } else if (r.menu) {
                processItem(r.menu, 1, "Menu Utama");
            }

            if (r.tambahan) {
                const detectedExtras = parseExtraOrdersFromNotes(r.tambahan);
                detectedExtras.forEach(extra => processItem(extra.name, extra.quantity, "Request Tambahan"));
            }
        });

        // RENDER: MENU UTAMA (PLATING)
        const menuCont = document.getElementById('kitchenMenuContainer');
        menuCont.innerHTML = '';
        Object.entries(menuAgg).sort((a,b)=>b[1]-a[1]).forEach(([name, count]) => {
            menuCont.innerHTML += `
            <div class="prep-item">
                <span class="prep-name">${name}</span>
                <span class="prep-count">${count}</span>
            </div>`;
        });
        if (!menuCont.innerHTML) menuCont.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Belum ada pesanan.</div>';

        // RENDER: TOTAL KOMPONEN (PREP)
        const compCont = document.getElementById('kitchenCompContainer');
        compCont.innerHTML = '';
        Object.entries(globalCompDetails).sort((a,b)=>b[1].total - a[1].total).forEach(([name, data]) => {
            const sourceArray = Array.from(data.sources);
            let sourceText = "Utk: " + sourceArray.slice(0, 4).join(', ');
            if (sourceArray.length > 4) sourceText += ", dll";

            compCont.innerHTML += `
            <div class="prep-item clickable" onclick="showComponentDetail('${name}')" style="cursor:pointer;">
                <div class="prep-info">
                    <span class="prep-name">
                        <i class="fas fa-search-plus" style="color:var(--primary); font-size:0.8rem; margin-right:4px;"></i> ${name}
                    </span>
                    <span class="prep-sources">${sourceText}</span>
                </div>
                <span class="prep-count comp-count">${data.total}</span>
            </div>`;
        });
        if (!compCont.innerHTML) compCont.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Tidak ada data komponen.</div>';
    }

    function showComponentDetail(compName) {
        const data = globalCompDetails[compName];
        if (!data) return;
        document.getElementById('modalTitle').innerText = compName;
        const list = document.getElementById('detailList');
        list.innerHTML = '';
        data.items.sort((a,b) => a.jam.localeCompare(b.jam)).forEach(item => {
            list.innerHTML += `
            <li class="detail-row">
                <div style="flex:1;">
                    <span style="font-weight:600; display:block; font-size:0.95rem; color:var(--dark);">${item.nama}</span>
                    <span style="font-size:0.8rem; color:#666; display:flex; align-items:center; gap:6px;">
                        <i class="far fa-clock"></i> ${item.jam} • <span style="font-style:italic;">${item.sourceMenu}</span>
                    </span>
                </div>
                <span style="font-weight:700; color:var(--primary-dark); font-size:1.1rem; background:#eee; padding:4px 10px; border-radius:6px;">
                    ${item.qty}
                </span>
            </li>`;
        });
        document.getElementById('detailModal').classList.add('active');
    }

    function closeModal(e) { if(e.target.classList.contains('modal-overlay')) document.getElementById('detailModal').classList.remove('active'); }
    function closeModalBtn() { document.getElementById('detailModal').classList.remove('active'); }

    function toggleFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (type === 'all') document.getElementById('btnAll').classList.add('active');
        if (type === 'pagi') document.getElementById('btnPagi').classList.add('active');
        if (type === 'siang') document.getElementById('btnSiang').classList.add('active');
        renderUI();
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-tabs .nav-btn').forEach(b => { if(!b.classList.contains('filter-btn')) b.classList.remove('active'); });
        if (tab === 'floor') document.querySelectorAll('.nav-tabs .nav-btn')[0].classList.add('active');
        if (tab === 'kitchen') document.querySelectorAll('.nav-tabs .nav-btn')[1].classList.add('active');
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.getElementById(`view-${tab}`).classList.add('active');
    }

    function renderDateScroller() {
        const scroller = document.getElementById('dateScroller');
        scroller.innerHTML = '';
        const start = new Date(selectedDate);
        start.setDate(selectedDate.getDate() - 2);
        for (let i = 0; i < 14; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            const isSel = d.toDateString() === selectedDate.toDateString();
            const pill = document.createElement('div');
            pill.className = `date-pill ${isSel ? 'active' : ''}`;
            pill.onclick = () => { selectedDate = d; renderDateScroller(); loadData(d); };
            pill.innerHTML = `<span class="day">${d.toLocaleDateString('id-ID',{weekday:'short'})}</span><span class="num">${d.getDate()}</span>`;
            scroller.appendChild(pill);
        }
    }

    function goToToday() { selectedDate = new Date(); renderDateScroller(); loadData(selectedDate); }
    function handleDateSelect(val) { if(val){ selectedDate = new Date(val); renderDateScroller(); loadData(selectedDate); } }
</script>

</body>
